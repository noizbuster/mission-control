name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm lint
      - run: cargo test --manifest-path native/sidecar/Cargo.toml
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
      - run: cargo build --manifest-path native/sidecar/Cargo.toml
